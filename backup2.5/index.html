<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Sitzplan-Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

<header>
  <div>
    <h1>Sitzplan-Manager</h1>
    <div class="subtitle">von Denis Reznichenko</div>
  </div>
  <div class="header-right">
    <div class="subtitle">v1.0</div>
    <button class="btn-outline" id="save-pdf-btn">📄 PDF</button>
    <button class="btn-outline" id="theme-toggle-btn" title="Erscheinungsbild wechseln">☀️</button>
  </div>
</header>

<main>
  <!-- LEFT PANEL: Tags + Schüler -->
  <section class="panel" id="students-panel">

    <!-- Titles: always both visible, side by side at the top -->
    <div class="panel-title panel-title-clickable" id="panel-title-tags" onclick="panelTabClick('tags')">
      <span>Tags</span>
      <span class="small-label" id="tag-count-label">0 Tags</span>
    </div>
    <div class="panel-title panel-title-clickable" id="panel-title-students" onclick="panelTabClick('students')" style="margin-top:6px;">
      <span>Schüler</span>
      <span class="small-label" id="student-count-label">0 Schüler</span>
    </div>

    <!-- Tags content -->
    <div id="panel-tab-tags">
      <div class="row">
        <div>
          <input id="tag-name-input" type="text" placeholder="Tag-Name (z.B. kurzsichtig)" style="width:100%;" />
          <div class="checkbox-group">
            <label><input type="checkbox" id="prop-beforeLine" />vor Linie sitzen</label>
            <label><input type="checkbox" id="prop-behindLine" />hinter Linie sitzen</label>
            <label><input type="checkbox" id="prop-cantShareTable" />Nicht gleicher Tisch</label>
            <label><input type="checkbox" id="prop-mustWindow" />Nähe Fenster</label>
            <label><input type="checkbox" id="prop-mustDoor" />Nähe Tür</label>
          </div>
          <div class="input-row" style="margin-top:4px;">
            <span class="small-label">Farbe</span>
            <input type="color" id="tag-color-input" />
            <button class="btn-outline" id="random-color-btn">Zufällig</button>
          </div>
        </div>
        <div class="tag-add-wrapper">
          <button class="btn-outline" id="add-tag-btn">Tag+</button>
        </div>
      </div>
      <div class="input-row">
        <input id="tag-search-input" class="search-input" type="text" placeholder="Tags suchen…" />
      </div>
      <div class="error" id="tag-error"></div>
      <div class="list" id="tag-list"></div>
    </div>

    <!-- Schüler content -->
    <div id="panel-tab-students">
      <div class="input-row" style="flex-wrap:nowrap;">
        <input id="student-name-input" type="text" placeholder="Schülervorname" style="flex:1;min-width:0;" />
        <button class="btn-primary" id="add-student-btn" style="flex-shrink:0;">Hinzufügen</button>
      </div>
      <div class="input-row">
        <input id="student-search-input" class="search-input" type="text" placeholder="Schüler suchen…" />
      </div>
      <div class="error" id="student-error"></div>
      <div class="list" id="student-list"></div>
    </div>

  </section>

  <!-- RIGHT PANEL: Sitzplan -->
  <section class="panel" id="seating-panel">

    <!-- Compact toolbar: title + layout select + controls + generate + status -->
    <div class="seating-toolbar">
      <div class="seating-toolbar-left">
        <span class="panel-title-inline">Raum &amp; Sitzplan</span>
        <span class="small-label">Sitzordnung</span>
        <select id="layout-type-select">
          <option value="linear">Linear</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="seating-toolbar-right" id="seating-toolbar-right">
        <!-- Linear controls -->
        <div id="config-linear-toolbar" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <label class="toolbar-option">Reihen
            <input id="rows-input" type="range" value="3" min="1" max="10" style="width:80px;" />
            <span id="rows-value">3</span>
          </label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option">Tische/Reihe
            <input id="tables-input" type="range" value="4" min="1" max="12" style="width:80px;" />
            <span id="tables-value">4</span>
          </label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option"><input type="checkbox" id="toggle-scanner-line" checked /> Trennlinie</label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option"><input type="checkbox" id="toggle-hide-tags-linear" /> Tags ausblenden</label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <button class="btn-primary" id="generate-btn">Plätze zuweisen</button>
        </div>
        <!-- Custom controls -->
        <div id="config-custom-toolbar" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;">
          <button class="btn-outline" id="custom-add-single-btn">＋ Einzeltisch</button>
          <button class="btn-outline" id="custom-add-double-btn">＋ Doppeltisch</button>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option"><input type="checkbox" id="toggle-snapping" checked /> Snapping</label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option" id="snap-grid-label-wrap">Raster
            <input id="snap-grid-input" type="range" value="10" min="5" max="40" step="5" style="width:60px;" />
            <span id="snap-grid-value">10</span>px
          </label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option"><input type="checkbox" id="toggle-scanner-line-custom" checked /> Trennlinie</label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <label class="toolbar-option"><input type="checkbox" id="toggle-hide-tags-custom" /> Tags ausblenden</label>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <button class="btn-primary" id="generate-btn">Plätze zuweisen</button>
        </div>
      </div>
    </div>

    <!-- Custom hint + status row -->
    <div id="config-custom-hint" style="display:none;" class="hint" style="font-size:0.72rem;padding:2px 0;">
      Drag: verschieben · <kbd>Shift</kbd>: Mehrfachauswahl · <kbd>Ctrl</kbd>+Drag: duplizieren ·
      Drehen: <kbd>←</kbd>/<kbd>→</kbd> · <kbd>Del</kbd>: löschen · <kbd>Ctrl</kbd>+<kbd>A/C/V/D</kbd>
    </div>
    <div class="hint seating-status-row" id="status-label">Noch kein Sitzplan generiert.</div>

    <!-- Needed by legacy JS toggle (kept hidden) -->
    <div id="config-linear" style="display:none;"></div>
    <div id="config-custom" style="display:none;"></div>

    <div id="print-info" class="print-only"></div>
    <div class="tables-container" id="tables-container"></div>
  </section>
</main>

<script src="script.js"></script>
<script>
// === Panel tab toggle (small screens ≤1366px) ===
var _panelActiveTab = 'tags';

function panelTabClick(tab) {
  var isSmall = window.matchMedia('(max-width:1366px)').matches;
  if (!isSmall) return; // on large screens clicking does nothing
  _panelActiveTab = _panelActiveTab === tab ? null : tab; // toggle: click same = show both? no, always switch
  _panelActiveTab = tab;
  applyPanelTab();
}

function applyPanelTab() {
  var isSmall = window.matchMedia('(max-width:1366px)').matches;
  var tagsContent = document.getElementById('panel-tab-tags');
  var studentsContent = document.getElementById('panel-tab-students');
  var titleTags = document.getElementById('panel-title-tags');
  var titleStudents = document.getElementById('panel-title-students');
  if (!tagsContent || !studentsContent) return;

  if (isSmall) {
    var showTags = _panelActiveTab === 'tags';
    // Only content toggles; both titles are always visible
    tagsContent.style.display = showTags ? '' : 'none';
    studentsContent.style.display = showTags ? 'none' : '';
    // Dim the inactive title, highlight the active one
    if (titleTags) titleTags.style.opacity = showTags ? '1' : '0.45';
    if (titleStudents) titleStudents.style.opacity = showTags ? '0.45' : '1';
  } else {
    // Large screen: always show everything
    tagsContent.style.display = '';
    studentsContent.style.display = '';
    if (titleTags) titleTags.style.opacity = '';
    if (titleStudents) titleStudents.style.opacity = '';
  }
}

window.addEventListener('resize', applyPanelTab);
window.addEventListener('DOMContentLoaded', function() { applyPanelTab(); });
</script>
</body>
</html>
